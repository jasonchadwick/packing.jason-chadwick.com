name = "packing"
compatibility_date = "2025-01-01"
main = "worker/index.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "LISTS"
# Run: wrangler kv namespace create LISTS
# Then paste the returned id below.
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
# For local dev with `wrangler dev`, also create a preview namespace:
# wrangler kv namespace create LISTS --preview
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"
